<!doctype html>
<html lang="en">
<head>
<title>U4C Launcher</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
class ABC {
constructor(config = {}) {
this.type = config.type || "blank"
this.url = config.url || "about:blank"
}
setType(type) {
if (!type) return;
this.type = type
}
setUrl(url) {
if (!url) return;
this.url = url
}
getCode() {
return `<iframe style="height:100%; width: 100%; border: none; position: fixed; top: 0; right: 0; left: 0; bottom: 0; border: none" sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-same-origin allow-scripts allow-top-navigation allow-top-navigation-by-user-activation" src="` + this.url + `"></iframe>`
}
open() {
if (this.type == "blank") {
try {
var page = window.open()
page.document.body.innerHTML = `<iframe style="height:100%; width: 100%; border: none; position: fixed; top: 0; right: 0; left: 0; bottom: 0; border: none" sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-same-origin allow-scripts allow-top-navigation allow-top-navigation-by-user-activation" src="` + this.url + `"></iframe>`
} catch {
}
} else if (this.type == "blob") {
try {
var page = new Blob([`<iframe style="height:100%; width: 100%; border: none; position: fixed; top: 0; right: 0; left: 0; bottom: 0; border: none" sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-same-origin allow-scripts allow-top-navigation allow-top-navigation-by-user-activation" src="` + this.url + `"></iframe>`], {type: "text/html"})
window.open(URL.createObjectURL(page))
} catch {
}
} else if (this.type == "overwrite") {
try {
document.body.innerHTML = `<iframe style="height:100%; width: 100%; border: none; position: fixed; top: 0; right: 0; left: 0; bottom: 0; border: none" sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-same-origin allow-scripts allow-top-navigation allow-top-navigation-by-user-activation" src="` + this.url + `"></iframe>`
} catch {
}
}
}
}
</script>
</head>
<body>
<div class="backdrop" aria-hidden="true"></div>
<div class="orb orb-a" aria-hidden="true"></div>
<div class="orb orb-b" aria-hidden="true"></div>
<div class="orb orb-c" aria-hidden="true"></div>
<main class="shell">
<header class="hero">
<div class="badge">U4C Launcher</div>
<h1>U4C Launcher</h1>
<p class="lede">Type a URL, choose a launch style, and go.</p>
</header>

<section class="panel">
<label class="field">
<span>Destination URL</span>
<input id="url-input" type="url" inputmode="url" placeholder="https://example.com" value="https://example.com" autocomplete="off">
</label>

<label class="field">
<span>Open mode</span>
<select id="type-input">
<option value="blank">Blank tab</option>
<option value="blob">Blob tab</option>
<option value="overwrite">Overwrite page</option>
</select>
</label>

<button class="run" id="launch-btn" type="button">Launch</button>
</section>

<section class="sessions">
<div class="recent-head">
<h2>Running sessions</h2>
<div class="recent-sub">Click a card to preview, then open in its mode.</div>
</div>
<div class="cards" id="session-list"></div>
<div class="preview" id="session-preview">
<div class="preview-meta">
<div>
<div class="preview-title" id="preview-title">Select a session</div>
<div class="preview-sub" id="preview-sub">Preview will appear here.</div>
</div>
<button class="run" id="preview-open" type="button" disabled>Open</button>
</div>
<div class="preview-frame">
<iframe id="preview-frame" title="Session preview" sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-same-origin allow-scripts"></iframe>
</div>
</div>
</section>

<section class="recent">
<div class="recent-head">
<h2>Recent launches</h2>
<div class="recent-sub">Saved locally in IndexedDB</div>
</div>
<div class="cards" id="recent-list"></div>
</section>

</main>

<div class="modal" id="mode-modal" aria-hidden="true">
<div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="mode-title">
<div class="modal-header">
<div class="modal-eyebrow">Mode guide</div>
<h3 id="mode-title"></h3>
</div>
<p class="modal-desc" id="mode-desc"></p>
<label class="modal-check">
<input type="checkbox" id="mode-skip">
<span>Don't show for this mode again</span>
</label>
<div class="modal-actions">
<button class="ghost" id="mode-back" type="button">Back</button>
<button class="run" id="mode-go" type="button">Go</button>
</div>
</div>
</div>

<style>

<script>
const urlInput = document.getElementById("url-input")
const typeInput = document.getElementById("type-input")
const launchBtn = document.getElementById("launch-btn")
const backdrop = document.querySelector(".backdrop")
const orbA = document.querySelector(".orb-a")
const orbB = document.querySelector(".orb-b")
const orbC = document.querySelector(".orb-c")
const recentList = document.getElementById("recent-list")
const sessionList = document.getElementById("session-list")
const previewFrame = document.getElementById("preview-frame")
const previewTitle = document.getElementById("preview-title")
const previewSub = document.getElementById("preview-sub")
const previewOpen = document.getElementById("preview-open")
const modeModal = document.getElementById("mode-modal")
const modeTitle = document.getElementById("mode-title")
const modeDesc = document.getElementById("mode-desc")
const modeSkip = document.getElementById("mode-skip")
const modeBack = document.getElementById("mode-back")
const modeGo = document.getElementById("mode-go")
let mouseX = window.innerWidth / 2
let mouseY = window.innerHeight / 2
let scrollOffset = 0
let dbPromise = null
let sessions = []
let activeSessionId = null
let pendingLaunch = null

function normalizeUrl(value) {
const trimmed = value.trim()
if (!trimmed) return "about:blank"
if (trimmed.startsWith("http://") || trimmed.startsWith("https://")) {
return trimmed
}
return "https://" + trimmed
}

launchBtn.addEventListener("click", async () => {
const url = normalizeUrl(urlInput.value)
addSession({ url, type: typeInput.value })
await saveLaunch({ url, type: typeInput.value })
refreshLaunches()
})

function handleParallax() {
const { innerWidth: width, innerHeight: height } = window
const x = ((mouseX / width) - 0.5) * 20
const y = ((mouseY / height) - 0.5) * 20

backdrop.style.setProperty("--bg-x", `${x * 0.6}px`)
backdrop.style.setProperty("--bg-y", `${y * 0.6 + scrollOffset}px`)
orbA.style.setProperty("--orb-x", `${x * 1.8}px`)
orbA.style.setProperty("--orb-y", `${y * 1.6 + scrollOffset * 0.8}px`)
orbB.style.setProperty("--orb-x", `${x * -2.2}px`)
orbB.style.setProperty("--orb-y", `${y * 1.2 + scrollOffset * 1.1}px`)
orbC.style.setProperty("--orb-x", `${x * 1.4}px`)
orbC.style.setProperty("--orb-y", `${y * -1.6 + scrollOffset * 1.3}px`)
}

window.addEventListener("mousemove", (event) => {
mouseX = event.clientX
mouseY = event.clientY
handleParallax()
})

window.addEventListener("scroll", () => {
scrollOffset = window.scrollY * 0.12
handleParallax()
})

function tick(timestamp) {
const drift = (timestamp * 0.04) % 600
const slowDrift = (timestamp * 0.02) % 480
const fastDrift = (timestamp * 0.06) % 720
backdrop.style.setProperty("--bg-auto-y", `${drift}px`)
orbA.style.setProperty("--orb-auto-y", `${slowDrift * 0.6}px`)
orbB.style.setProperty("--orb-auto-y", `${fastDrift * -0.4}px`)
orbC.style.setProperty("--orb-auto-y", `${drift * 0.5}px`)
requestAnimationFrame(tick)
}

handleParallax()
requestAnimationFrame(tick)

function openDb() {
if (dbPromise) return dbPromise
if (!("indexedDB" in window)) {
recentList.innerHTML = '<div class="empty">IndexedDB is not available in this browser.</div>'
return Promise.reject(new Error("IndexedDB unavailable"))
}
dbPromise = new Promise((resolve, reject) => {
const request = indexedDB.open("abc-launcher", 2)
request.onerror = () => reject(request.error)
request.onupgradeneeded = () => {
const db = request.result
if (!db.objectStoreNames.contains("launches")) {
const store = db.createObjectStore("launches", { keyPath: "id", autoIncrement: true })
store.createIndex("ts", "ts")
store.createIndex("favorite", "favorite")
}
if (!db.objectStoreNames.contains("settings")) {
db.createObjectStore("settings", { keyPath: "key" })
}
}
request.onsuccess = () => resolve(request.result)
})
return dbPromise
}

async function saveLaunch(entry) {
const db = await openDb()
const tx = db.transaction("launches", "readwrite")
const store = tx.objectStore("launches")
store.add({
url: entry.url,
type: entry.type,
ts: Date.now(),
favorite: false
})
return new Promise((resolve) => {
tx.oncomplete = resolve
tx.onerror = resolve
})
}

async function getLaunches() {
const db = await openDb()
const tx = db.transaction("launches", "readonly")
const store = tx.objectStore("launches")
return new Promise((resolve) => {
const request = store.getAll()
request.onsuccess = () => resolve(request.result || [])
request.onerror = () => resolve([])
})
}

async function updateFavorite(id, favorite) {
const db = await openDb()
const tx = db.transaction("launches", "readwrite")
const store = tx.objectStore("launches")
return new Promise((resolve) => {
const request = store.get(Number(id))
request.onsuccess = () => {
const record = request.result
if (!record) {
resolve()
return
}
record.favorite = favorite
store.put(record)
resolve()
}
request.onerror = () => resolve()
})
}

function formatDate(ts) {
const date = new Date(ts)
return date.toLocaleString()
}

const MODE_INFO = {
blank: {
title: "Blank tab",
desc: "Opens a fresh tab with the destination loaded inside a full-page iframe."
},
blob: {
title: "Blob tab",
desc: "Opens a new tab from a Blob-backed page, then loads the destination in an iframe."
},
overwrite: {
title: "Overwrite page",
desc: "Replaces this page with the destination iframe in the current tab."
}
}

async function getModePreference(mode) {
try {
const db = await openDb()
const tx = db.transaction("settings", "readonly")
const store = tx.objectStore("settings")
return new Promise((resolve) => {
const request = store.get(`mode:${mode}`)
request.onsuccess = () => resolve(request.result ? request.result.value : null)
request.onerror = () => resolve(null)
})
} catch {
return null
}
}

async function setModePreference(mode, value) {
try {
const db = await openDb()
const tx = db.transaction("settings", "readwrite")
const store = tx.objectStore("settings")
store.put({ key: `mode:${mode}`, value })
return new Promise((resolve) => {
tx.oncomplete = resolve
tx.onerror = resolve
})
} catch {
return null
}
}

function showModeModal(entry, onConfirm) {
pendingLaunch = { entry, onConfirm }
const info = MODE_INFO[entry.type] || { title: entry.type, desc: "Opens using the selected mode." }
modeTitle.textContent = info.title
modeDesc.textContent = info.desc
modeSkip.checked = false
modeModal.classList.add("is-open")
modeModal.setAttribute("aria-hidden", "false")
}

function closeModeModal() {
modeModal.classList.remove("is-open")
modeModal.setAttribute("aria-hidden", "true")
pendingLaunch = null
}

async function requestLaunch(entry, onConfirm) {
const pref = await getModePreference(entry.type)
if (pref && pref.skip) {
onConfirm()
return
}
showModeModal(entry, onConfirm)
}

function getFaviconUrl(url) {
try {
const parsed = new URL(url)
const domain = parsed.hostname
return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=64`
} catch {
return ""
}
}

function addSession(entry) {
const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6)
const session = {
id,
url: entry.url,
type: entry.type,
ts: Date.now()
}
sessions = [session, ...sessions].slice(0, 8)
renderSessions()
setActiveSession(id)
}

function renderSessions() {
if (!sessions.length) {
sessionList.innerHTML = '<div class="empty">No running sessions yet.</div>'
return
}
sessionList.innerHTML = sessions.map((item) => {
const safeUrl = escapeHtml(item.url)
const safeType = escapeHtml(item.type)
const favicon = getFaviconUrl(item.url)
const isActive = item.id === activeSessionId
return `
<article class="card${isActive ? " is-active" : ""}" data-session="${item.id}">
<div class="card-head">
<h3 class="card-title">${safeUrl}</h3>
${favicon ? `<img class="favicon" src="${favicon}" alt="" loading="lazy" decoding="async">` : ""}
</div>
<div class="card-meta">
<div>Mode: ${safeType}</div>
<div>Added: ${formatDate(item.ts)}</div>
</div>
</article>
`
}).join("")
}

function setActiveSession(id) {
const session = sessions.find((item) => item.id === id)
if (!session) return
activeSessionId = id
previewTitle.textContent = session.url
previewSub.textContent = `Mode: ${session.type}`
previewFrame.src = session.url
previewOpen.disabled = false
renderSessions()
}

previewOpen.addEventListener("click", () => {
const session = sessions.find((item) => item.id === activeSessionId)
if (!session) return
requestLaunch(session, () => {
const page = new ABC({ type: session.type, url: session.url })
page.open()
})
})

sessionList.addEventListener("click", (event) => {
const card = event.target.closest("[data-session]")
if (!card) return
setActiveSession(card.dataset.session)
})

function escapeHtml(value) {
return String(value)
.replace(/&/g, "&amp;")
.replace(/</g, "&lt;")
.replace(/>/g, "&gt;")
.replace(/"/g, "&quot;")
.replace(/'/g, "&#39;")
}

function renderLaunches(items) {
if (!items.length) {
recentList.innerHTML = '<div class="empty">No launches yet. Open a site to save it here.</div>'
return
}
const sorted = items.slice().sort((a, b) => {
if (a.favorite !== b.favorite) return a.favorite ? -1 : 1
return b.ts - a.ts
})
recentList.innerHTML = sorted.map((item) => {
const favClass = item.favorite ? "fav is-on" : "fav"
const favText = item.favorite ? "Unfavorite" : "Favorite"
const safeUrl = escapeHtml(item.url)
const safeType = escapeHtml(item.type)
const favicon = getFaviconUrl(item.url)
return `
<article class="card">
<div class="card-head">
<h3 class="card-title">${safeUrl}</h3>
${favicon ? `<img class="favicon" src="${favicon}" alt="" loading="lazy" decoding="async">` : ""}
</div>
<div class="card-meta">
<div>Mode: ${safeType}</div>
<div>Last: ${formatDate(item.ts)}</div>
</div>
<div class="card-actions">
<button class="primary" data-action="launch" data-id="${item.id}">Launch</button>
<button class="${favClass}" data-action="favorite" data-id="${item.id}" data-fav="${item.favorite}">${favText}</button>
</div>
</article>
`
}).join("")
}

async function refreshLaunches() {
try {
const items = await getLaunches()
renderLaunches(items)
} catch {
}
}

recentList.addEventListener("click", async (event) => {
const button = event.target.closest("button")
if (!button) return
const action = button.dataset.action
const id = button.dataset.id
if (!action || !id) return

const items = await getLaunches()
const match = items.find((item) => String(item.id) === String(id))
if (!match) return

if (action === "launch") {
requestLaunch(match, async () => {
const page = new ABC({ type: match.type, url: match.url })
page.open()
await saveLaunch({ url: match.url, type: match.type })
refreshLaunches()
})
}

if (action === "favorite") {
const next = button.dataset.fav !== "true"
await updateFavorite(id, next)
refreshLaunches()
}
})

refreshLaunches()

modeBack.addEventListener("click", () => {
closeModeModal()
})

modeGo.addEventListener("click", async () => {
if (!pendingLaunch) return
const { entry, onConfirm } = pendingLaunch
if (modeSkip.checked) {
await setModePreference(entry.type, { skip: true })
}
closeModeModal()
onConfirm()
})
</script>

</body>
</html>
